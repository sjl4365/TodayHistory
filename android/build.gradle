// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"

/**
 * Fix for AGP 8+: some libraries (ex: @amplitude/analytics-react-native) define BuildConfig fields.
 * If BuildConfig generation is disabled, those library projects can end up with "No variants exist".
 */
subprojects { subproject ->
  afterEvaluate {
    if (subproject.plugins.hasPlugin("com.android.library") ||
        subproject.plugins.hasPlugin("com.android.application")) {

      if (subproject.hasProperty("android")) {
        subproject.android {
          buildFeatures {
            buildConfig true
          }
        }
      }
    }
  }
}
